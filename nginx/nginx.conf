server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Отдаем статику webapp
    location / {
        try_files $uri $uri/ /index.html;
    }

    # === ЗАГОЛОВКИ БЕЗОПАСНОСТИ ===
    
    # Content Security Policy — разрешаем только доверенные источники
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;
    
    # Запрет на MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Разрешаем отображение в iframe только для Telegram
    # X-Frame-Options deprecated в пользу CSP frame-ancestors, но добавляем для совместимости
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # CORS — ограничиваем до конкретного домена Telegram
    add_header Access-Control-Allow-Origin "https://web.telegram.org" always;
    
    # Защита от XSS (для старых браузеров)
    add_header X-XSS-Protection "1; mode=block" always;

    # === Rate Limiting ===
    # Определяется в http-блоке nginx (см. ниже)

    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|json)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Логи
    access_log /var/log/nginx/webapp_access.log;
    error_log  /var/log/nginx/webapp_error.log;
}
